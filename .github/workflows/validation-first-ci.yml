name: validation-first-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validation-first:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EARTHDATA_TOKEN: ""
      EARTHDATA_BEARER_TOKEN: ""
      EARTHDATA_USERNAME: ""
      EARTHDATA_PASSWORD: ""
      GEOANOMALY_CI_NO_DOWNLOADS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install package and declared dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Compile validation-first sources
        run: |
          python -m compileall -q blind_validation.py geoanomaly.py json_utils.py slc_data_fetcher.py project_paths.py deformation_intel tests

      - name: Run no-download release health check
        run: |
          geoanomaly health --json --skip-gpu

      - name: Print reproducible fixture commands
        run: |
          geoanomaly commands

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests
